<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Completo | TechStore Online</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>
<body>

  <header>
    <figure style="margin: 0;">
      <a href="index.html">
        <img src="img/logo-nuevo.png" alt="TechStore" width="150">
      </a>
    </figure>
    
    <input type="checkbox" id="menu-toggle" style="display:none;">
    <label for="menu-toggle" class="menu-toggle-label" style="cursor: pointer; font-size: 1.5rem; display: none;"><i class="fa-solid fa-bars"></i></label>
    
    <nav aria-label="Navegación principal" class="nav-principal">
      <menu>
        <li><a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
        <li><a href="productos.html"><i class="fa-solid fa-box-open"></i> Catálogo</a></li>
        <li><a href="carrito.html"><i class="fa-solid fa-cart-shopping"></i> Mi Carrito</a></li>
        <li><a href="contacto.html"><i class="fa-solid fa-envelope"></i> Contacto</a></li>
        <li><a href="acerca.html"><i class="fa-solid fa-building"></i> Quiénes Somos</a></li>
        <li><a href="perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a></li> 
      </menu>
    </nav>

    <form role="search" action="productos.html" method="get" style="box-shadow: none; padding: 0; background: transparent;">
      <div style="display: flex; gap: 10px;">
        <input type="search" id="busqueda-global" name="q" placeholder="Buscar equipo..." required style="width: 180px;">
        <button type="submit" style="padding: 10px 15px;"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
    </form>
  </header>

  <main class="layout-catalogo">
  <aside aria-label="Panel de Filtros">
    <fieldset>
      <legend>Filtrar por Marca</legend>
      <select id="filtro-marca">
        <option value="">Todas</option>
        <option value="apple">Apple</option>
        <option value="asus">Asus</option>
      </select>
    </fieldset>
    <fieldset>
      <legend>Precio Máximo</legend>
      <input type="number" id="filtro-precio" placeholder="Ej: 2000">
    </fieldset>
  </aside>

  <section aria-label="Resultados del catálogo">
    <h2 id="titulo-contador">Resultados</h2>
    <dl id="contenedor-productos"></dl>
  </section>
</main>

  <hr>
  <footer>
    <address>Av. San Vicente, Santo Domingo Este, RD.</address>
    <small>© 2026 TechStore Online.</small>
  </footer>
<script type="module" src="js/catalogo.js"></script>
</body>
</html>
